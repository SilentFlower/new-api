name: Publish Docker image (build)

on:
  push:
    branches:
      - build
      - '**'
  workflow_dispatch:
    inputs:
      name:
        description: "reason"
        required: false

jobs:
  build_single_arch:
    name: Build & push (${{ matrix.arch }}) [native]
    if: github.ref == 'refs/heads/build' || contains(github.event.head_commit.message, '[build]')
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out (shallow)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Determine build version and branch tag
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="build-${SHORT_SHA}"
          echo "$VERSION" > VERSION
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          # 根据分支名生成 latest tag
          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          if [ "$BRANCH_NAME" = "build" ]; then
            LATEST_TAG="build-latest"
          else
            # 将分支名中的 / 替换为 -，如 feature/dashboard-enhancement -> feature-dashboard-enhancement
            SANITIZED=$(echo "$BRANCH_NAME" | sed 's|/|-|g')
            LATEST_TAG="${SANITIZED}-latest"
          fi
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
          echo "Publishing version: $VERSION ($LATEST_TAG) for ${{ matrix.arch }}"

      - name: Normalize GHCR repository
        run: echo "GHCR_REPOSITORY=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ghcr.io/${{ env.GHCR_REPOSITORY }}

      - name: Build & push single-arch
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ghcr.io/${{ env.GHCR_REPOSITORY }}:${{ steps.version.outputs.value }}-${{ matrix.arch }}
            ghcr.io/${{ env.GHCR_REPOSITORY }}:${{ env.LATEST_TAG }}-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Output digest
        run: |
          echo "### Docker Image Digest (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ env.GHCR_REPOSITORY }}:${{ steps.version.outputs.value }}-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ env.GHCR_REPOSITORY }}:${{ env.LATEST_TAG }}-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  create_manifests:
    name: Create multi-arch manifests (GHCR)
    needs: [build_single_arch]
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out (shallow)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Normalize GHCR repository
        run: echo "GHCR_REPOSITORY=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Determine build version and branch tag
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="build-${SHORT_SHA}"
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          BRANCH_NAME="${GITHUB_REF#refs/heads/}"
          if [ "$BRANCH_NAME" = "build" ]; then
            LATEST_TAG="build-latest"
          else
            SANITIZED=$(echo "$BRANCH_NAME" | sed 's|/|-|g')
            LATEST_TAG="${SANITIZED}-latest"
          fi
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create & push manifest (GHCR - versioned)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${GHCR_REPOSITORY}:${VERSION} \
            ghcr.io/${GHCR_REPOSITORY}:${VERSION}-amd64 \
            ghcr.io/${GHCR_REPOSITORY}:${VERSION}-arm64

      - name: Create & push manifest (GHCR - branch latest)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${GHCR_REPOSITORY}:${LATEST_TAG} \
            ghcr.io/${GHCR_REPOSITORY}:${LATEST_TAG}-amd64 \
            ghcr.io/${GHCR_REPOSITORY}:${LATEST_TAG}-arm64

      - name: Output manifest digest
        run: |
          echo "### Multi-arch Manifest Digests" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker buildx imagetools inspect ghcr.io/${GHCR_REPOSITORY}:${VERSION} >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
